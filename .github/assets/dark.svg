<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%" style="background:#030712; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Background Radial Gradients -->
    <radialGradient id="bgGlow1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <!-- Animated ASCII Gradient -->
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#7C3AED;#10B981;#22D3EE" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#10B981;#22D3EE;#7C3AED" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Panel Clips -->
    <clipPath id="leftClip"><rect x="35" y="35" width="410" height="540" rx="20"/></clipPath>
    <clipPath id="rightClip"><rect x="475" y="35" width="670" height="540" rx="20"/></clipPath>
  </defs>

  <style>
    .text-primary { fill: #F8FAFC; }
    .text-muted { fill: #94A3B8; }
    .border-glow { stroke: rgba(255, 255, 255, 0.08); stroke-width: 1.5; }
    .panel { fill: #0F172A; fill-opacity: 0.65; }
    .pill { fill: rgba(30, 41, 59, 0.7); stroke: rgba(255,255,255,0.1); stroke-width: 1; }
    .pill-text { fill: #F8FAFC; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
    .ascii-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 11px; font-weight: 600; fill: url(#asciiGrad); white-space: pre; }
    .code-font { font-family: 'Fira Code', 'Cascadia Code', monospace; }
  </style>

  <!-- Canvas Background -->
  <rect width="1180" height="610" rx="20" fill="#030712"/>
  <rect width="1180" height="610" rx="20" fill="url(#bgGlow1)"/>
  <rect width="1180" height="610" rx="20" fill="url(#bgGlow2)"/>

  <!-- Particles -->
  <g fill="#22D3EE" opacity="0.3">
    <circle cx="100" cy="120" r="1.5"><animate attributeName="cy" values="120;100;120" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="480" r="2"><animate attributeName="cy" values="480;460;480" dur="6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="80" r="1.5"><animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="520" r="1.5"><animate attributeName="cy" values="520;500;520" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- LEFT SECTION: ANIMATED ASCII PORTRAIT CARD -->
  <g id="left-section">
    <rect x="35" y="35" width="410" height="540" rx="20" class="panel border-glow"/>
    
    <!-- Window Header Controls -->
    <circle cx="60" cy="60" r="5" fill="#EF4444"/>
    <circle cx="76" cy="60" r="5" fill="#F59E0B"/>
    <circle cx="92" cy="60" r="5" fill="#10B981"/>
    <text x="110" y="64" class="text-muted code-font" font-size="11" opacity="0.7">portrait_sachin.ascii</text>

    <!-- Floating ASCII Portrait Group -->
    <g transform="translate(0,0)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-7; 0,0" dur="6s" repeatCount="indefinite" ease="easeInOut"/>

      <!-- High-Detail ASCII Portrait of Sachin -->
      <text x="55" y="90" class="ascii-text">
        <tspan x="55" dy="0" opacity="0">       .-------------------.<animate attributeName="opacity" to="1" dur="0.05s" begin="0.1s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">      /   //  ||   ||  \\   \<animate attributeName="opacity" to="1" dur="0.05s" begin="0.18s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">     /   //   ||   ||   \\   \<animate attributeName="opacity" to="1" dur="0.05s" begin="0.26s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">    |   ((    ||   ||    ))   |<animate attributeName="opacity" to="1" dur="0.05s" begin="0.34s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">   /   .-------------------.   \<animate attributeName="opacity" to="1" dur="0.05s" begin="0.42s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |   /  .-------. .-------. \  |<animate attributeName="opacity" to="1" dur="0.05s" begin="0.50s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |  |  /  .---.  |  .---.  \ | |<animate attributeName="opacity" to="1" dur="0.05s" begin="0.58s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |  | |  (  O  ) | (  O  )  || |<animate attributeName="opacity" to="1" dur="0.05s" begin="0.66s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |  |  \  '---'  |  '---'  / | |<animate attributeName="opacity" to="1" dur="0.05s" begin="0.74s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |   \  '-------' '-------' /  |<animate attributeName="opacity" to="1" dur="0.05s" begin="0.82s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |    '----------.-.-------'   |<animate attributeName="opacity" to="1" dur="0.05s" begin="0.90s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |              (   )          |<animate attributeName="opacity" to="1" dur="0.05s" begin="0.98s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |               '-'           |<animate attributeName="opacity" to="1" dur="0.05s" begin="1.06s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |           .---------."      |<animate attributeName="opacity" to="1" dur="0.05s" begin="1.14s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |          /  .=====.  \      |<animate attributeName="opacity" to="1" dur="0.05s" begin="1.22s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |         |  [=======]  |     |<animate attributeName="opacity" to="1" dur="0.05s" begin="1.30s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">  |          \  '-----'  /      |<animate attributeName="opacity" to="1" dur="0.05s" begin="1.38s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">   \          '---------'      /<animate attributeName="opacity" to="1" dur="0.05s" begin="1.46s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">    '--.____________________.--'<animate attributeName="opacity" to="1" dur="0.05s" begin="1.54s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">             /   |  |   \<animate attributeName="opacity" to="1" dur="0.05s" begin="1.62s" fill="freeze"/></tspan>
        <tspan x="55" dy="14" opacity="0">            /____|__|____\<animate attributeName="opacity" to="1" dur="0.05s" begin="1.70s" fill="freeze"/></tspan>
      </text>

      <!-- User Card Metadata -->
      <g transform="translate(55, 415)" class="code-font" font-size="12">
        <text x="0" y="0" fill="#F8FAFC" font-weight="bold" font-size="16">Sachin Choudhary 👨‍💻</text>
        <text x="0" y="20" fill="#22D3EE">@Sachin2400</text>
        <line x1="0" y1="32" x2="330" y2="32" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

        <text x="0" y="52" fill="#94A3B8">> SYS.LOC:</text>
        <text x="110" y="52" fill="#F8FAFC">India 🇮🇳</text>

        <text x="0" y="74" fill="#94A3B8">> STATUS:</text>
        <text x="110" y="74" fill="#10B981">● Open To Work</text>

        <text x="0" y="96" fill="#94A3B8">> FOCUS:</text>
        <text x="110" y="96" fill="#22D3EE">Backend &amp; ML Pipelines</text>
      </g>
    </g>

    <!-- Scanline Sweep Effect -->
    <rect x="35" y="35" width="410" height="12" fill="url(#accentGrad)" opacity="0.18" clip-path="url(#leftClip)">
      <animate attributeName="y" values="35;560;35" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- RIGHT SECTION: TERMINAL WINDOW -->
  <g id="right-section">
    <rect x="475" y="35" width="670" height="540" rx="20" class="panel border-glow"/>
    
    <!-- Window Header -->
    <circle cx="505" cy="60" r="5" fill="#EF4444"/>
    <circle cx="521" cy="60" r="5" fill="#F59E0B"/>
    <circle cx="537" cy="60" r="5" fill="#10B981"/>
    <text x="555" y="64" class="text-muted code-font" font-size="12" opacity="0.7">sachin@dev-environment:~</text>

    <!-- Greeting -->
    <text x="505" y="120" class="text-primary" font-size="28" font-weight="bold">Hi, I'm Sachin Choudhary 👋</text>
    
    <!-- Typewriter Roles -->
    <g transform="translate(505, 160)">
      <!-- Phrase 1 -->
      <text x="0" y="0" fill="#22D3EE" class="code-font" font-size="19" font-weight="600" filter="url(#glow)">
        <animate attributeName="opacity" values="1;1;0;0;0" keyTimes="0;0.22;0.25;0.97;1" dur="12s" repeatCount="indefinite"/>
        > Full Stack &amp; Backend Engineer
      </text>
      <!-- Phrase 2 -->
      <text x="0" y="0" fill="#7C3AED" class="code-font" font-size="19" font-weight="600" filter="url(#glow)">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.27;0.47;0.50;1" dur="12s" repeatCount="indefinite"/>
        > Machine Learning &amp; GenAI Developer
      </text>
      <!-- Phrase 3 -->
      <text x="0" y="0" fill="#10B981" class="code-font" font-size="19" font-weight="600" filter="url(#glow)">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.50;0.52;0.72;0.75;1" dur="12s" repeatCount="indefinite"/>
        > Cloud &amp; Distributed Systems Builder
      </text>
      <!-- Phrase 4 -->
      <text x="0" y="0" fill="#F59E0B" class="code-font" font-size="19" font-weight="600" filter="url(#glow)">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.75;0.77;0.97;1" dur="12s" repeatCount="indefinite"/>
        > Open Source Contributor
      </text>

      <!-- Blinking Cursor -->
      <rect x="420" y="-16" width="9" height="22" fill="#F8FAFC">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <line x1="505" y1="190" x2="1110" y2="190" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Key Information -->
    <g transform="translate(505, 225)" class="code-font" font-size="13.5">
      <text x="0" y="0" class="text-muted">📍 Location:</text>
      <text x="140" y="0" class="text-primary">India 🇮🇳</text>

      <text x="0" y="28" class="text-muted">🎓 Education:</text>
      <text x="140" y="28" class="text-primary">B.Tech in Computer Science</text>

      <text x="0" y="56" class="text-muted">⚡ Focus:</text>
      <text x="140" y="56" class="text-primary">Java, Spring Boot, Next.js, AWS</text>

      <text x="0" y="84" class="text-muted">🎯 Passions:</text>
      <text x="140" y="84" class="text-primary">ML Pipelines, System Design, GenAI</text>

      <text x="0" y="112" class="text-muted">📫 Email:</text>
      <text x="140" y="112" fill="#22D3EE">sachin24250@gmail.com</text>
    </g>

    <!-- Skills Section -->
    <text x="505" y="380" class="text-primary" font-size="15" font-weight="bold">Tech Stack &amp; Tools</text>
    
    <g transform="translate(505, 398)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="75" height="30" rx="15" class="pill"/><text x="37.5" y="19" class="pill-text" text-anchor="middle">Java</text>
      <rect x="85" y="0" width="105" height="30" rx="15" class="pill"/><text x="137.5" y="19" class="pill-text" text-anchor="middle">Spring Boot</text>
      <rect x="200" y="0" width="80" height="30" rx="15" class="pill"/><text x="240" y="19" class="pill-text" text-anchor="middle">Python</text>
      <rect x="290" y="0" width="95" height="30" rx="15" class="pill"/><text x="337.5" y="19" class="pill-text" text-anchor="middle">TypeScript</text>
      <rect x="395" y="0" width="80" height="30" rx="15" class="pill"/><text x="435" y="19" class="pill-text" text-anchor="middle">Next.js</text>
      <rect x="485" y="0" width="75" height="30" rx="15" class="pill"/><text x="522.5" y="19" class="pill-text" text-anchor="middle">React</text>

      <!-- Row 2 -->
      <rect x="0" y="40" width="70" height="30" rx="15" class="pill"/><text x="35" y="59" class="pill-text" text-anchor="middle">AWS</text>
      <rect x="80" y="40" width="95" height="30" rx="15" class="pill"/><text x="127.5" y="59" class="pill-text" text-anchor="middle">PostgreSQL</text>
      <rect x="185" y="40" width="80" height="30" rx="15" class="pill"/><text x="225" y="59" class="pill-text" text-anchor="middle">Docker</text>
      <rect x="275" y="40" width="70" height="30" rx="15" class="pill"/><text x="310" y="59" class="pill-text" text-anchor="middle">Redis</text>
      <rect x="355" y="40" width="85" height="30" rx="15" class="pill"/><text x="397.5" y="59" class="pill-text" text-anchor="middle">Tailwind</text>
      <rect x="450" y="40" width="70" height="30" rx="15" class="pill"/><text x="485" y="59" class="pill-text" text-anchor="middle">Git</text>
    </g>

    <!-- Social Action Badges -->
    <g transform="translate(505, 508)">
      <rect x="0" y="0" width="130" height="34" rx="8" fill="url(#accentGrad)" opacity="0.9"/>
      <text x="65" y="21" fill="#FFFFFF" class="code-font" font-size="12" font-weight="bold" text-anchor="middle">🚀 GitHub Profile</text>

      <rect x="145" y="0" width="120" height="34" rx="8" fill="#0F172A" stroke="#22D3EE" stroke-width="1"/>
      <text x="205" y="21" fill="#22D3EE" class="code-font" font-size="12" font-weight="bold" text-anchor="middle">💼 LinkedIn</text>
    </g>
  </g>
  
  <!-- Outer Border Shimmer -->
  <rect x="1" y="1" width="1178" height="608" rx="20" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>
</svg>
