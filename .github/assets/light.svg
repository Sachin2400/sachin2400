<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%" style="background:#FFFFFF; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <radialGradient id="bgGlowL1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowL2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="accentGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <clipPath id="avatarClipL">
      <circle cx="240" cy="180" r="75"/>
    </clipPath>
    <clipPath id="leftClipL"><rect x="35" y="35" width="410" height="540" rx="20"/></clipPath>
  </defs>

  <style>
    .text-primary-l { fill: #0F172A; }
    .text-muted-l { fill: #475569; }
    .border-glow-l { stroke: rgba(15, 23, 42, 0.08); stroke-width: 1.5; }
    .panel-l { fill: #F8FAFC; fill-opacity: 0.95; }
    .pill-l { fill: #FFFFFF; stroke: rgba(15,23,42,0.1); stroke-width: 1; }
    .code-font { font-family: 'Fira Code', 'Cascadia Code', monospace; }
  </style>

  <rect width="1180" height="610" fill="#FFFFFF"/>
  <rect width="1180" height="610" fill="url(#bgGlowL1)"/>
  <rect width="1180" height="610" fill="url(#bgGlowL2)"/>

  <g id="left-section-light">
    <rect x="35" y="35" width="410" height="540" rx="20" class="panel-l border-glow-l"/>
    
    <g transform="translate(0,0)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="6s" repeatCount="indefinite" ease="easeInOut"/>
      
      <circle cx="240" cy="180" r="82" fill="none" stroke="url(#accentGradL)" stroke-width="4"/>
      <image href="https://github.com/Sachin2400.png" x="165" y="105" width="150" height="150" clip-path="url(#avatarClipL)"/>

      <text x="240" y="300" fill="#0F172A" font-size="22" font-weight="bold" text-anchor="middle">Sachin Choudhary 👨‍💻</text>
      <text x="240" y="325" fill="#2563EB" class="code-font" font-size="14" text-anchor="middle">@Sachin2400</text>

      <line x1="75" y1="350" x2="405" y2="350" stroke="rgba(15,23,42,0.1)" stroke-width="1"/>

      <g transform="translate(85, 380)" class="code-font" font-size="13">
        <text x="0" y="0" fill="#475569">> SYS.LOC:</text>
        <text x="130" y="0" fill="#0F172A">India 🇮🇳</text>

        <text x="0" y="30" fill="#475569">> ROLE:</text>
        <text x="130" y="30" fill="#0F172A">Software Engineer</text>

        <text x="0" y="60" fill="#475569">> STATUS:</text>
        <text x="130" y="60" fill="#10B981">● Open To Work</text>

        <text x="0" y="90" fill="#475569">> FOCUS:</text>
        <text x="130" y="90" fill="#2563EB">Backend &amp; ML</text>
      </g>
    </g>

    <rect x="35" y="35" width="410" height="15" fill="url(#accentGradL)" opacity="0.1" clip-path="url(#leftClipL)">
      <animate attributeName="y" values="35;560;35" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g id="right-section-light">
    <rect x="475" y="35" width="670" height="540" rx="20" class="panel-l border-glow-l"/>
    
    <circle cx="510" cy="65" r="6" fill="#EF4444"/>
    <circle cx="530" cy="65" r="6" fill="#F59E0B"/>
    <circle cx="550" cy="65" r="6" fill="#10B981"/>
    <text x="575" y="70" class="text-muted-l code-font" font-size="12" opacity="0.7">sachin@dev-environment:~</text>

    <text x="510" y="125" class="text-primary-l" font-size="28" font-weight="bold">Hi, I'm Sachin 👋</text>
    
    <g transform="translate(510, 165)">
      <text x="0" y="0" fill="#2563EB" class="code-font" font-size="20" font-weight="600">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;1" dur="4s" repeatCount="indefinite"/>
        > Full Stack &amp; Backend Engineer
      </text>
      <text x="0" y="0" fill="#06B6D4" class="code-font" font-size="20" font-weight="600">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.95;1" dur="4s" repeatCount="indefinite"/>
        > Machine Learning Enthusiast
      </text>
      <rect x="360" y="-16" width="10" height="22" fill="#0F172A">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <line x1="510" y1="195" x2="1105" y2="195" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>

    <g transform="translate(510, 230)" class="code-font" font-size="14">
      <text x="0" y="0" class="text-muted-l">📍 Location:</text>
      <text x="140" y="0" class="text-primary-l">India 🇮🇳</text>

      <text x="0" y="30" class="text-muted-l">⚡ Tech Stack:</text>
      <text x="140" y="30" class="text-primary-l">Java, Spring Boot, Next.js, AWS</text>

      <text x="0" y="60" class="text-muted-l">🎯 Passions:</text>
      <text x="140" y="60" class="text-primary-l">Distributed Systems, GenAI, Open Source</text>

      <text x="0" y="90" class="text-muted-l">📫 Email:</text>
      <text x="140" y="90" fill="#2563EB">sachin24250@gmail.com</text>
    </g>

    <text x="510" y="375" class="text-primary-l" font-size="16" font-weight="bold">Core Skills</text>
    
    <g transform="translate(510, 395)">
      <rect x="0" y="0" width="80" height="32" rx="16" class="pill-l"/><text x="40" y="21" class="text-primary-l code-font" font-size="12" text-anchor="middle">Java</text>
      <rect x="90" y="0" width="100" height="32" rx="16" class="pill-l"/><text x="140" y="21" class="text-primary-l code-font" font-size="12" text-anchor="middle">Spring Boot</text>
      <rect x="200" y="0" width="90" height="32" rx="16" class="pill-l"/><text x="245" y="21" class="text-primary-l code-font" font-size="12" text-anchor="middle">TypeScript</text>
      <rect x="300" y="0" width="80" height="32" rx="16" class="pill-l"/><text x="340" y="21" class="text-primary-l code-font" font-size="12" text-anchor="middle">Next.js</text>
      <rect x="390" y="0" width="80" height="32" rx="16" class="pill-l"/><text x="430" y="21" class="text-primary-l code-font" font-size="12" text-anchor="middle">Python</text>

      <rect x="0" y="42" width="70" height="32" rx="16" class="pill-l"/><text x="35" y="63" class="text-primary-l code-font" font-size="12" text-anchor="middle">AWS</text>
      <rect x="80" y="42" width="90" height="32" rx="16" class="pill-l"/><text x="125" y="63" class="text-primary-l code-font" font-size="12" text-anchor="middle">PostgreSQL</text>
      <rect x="180" y="42" width="80" height="32" rx="16" class="pill-l"/><text x="220" y="63" class="text-primary-l code-font" font-size="12" text-anchor="middle">Docker</text>
      <rect x="270" y="42" width="70" height="32" rx="16" class="pill-l"/><text x="305" y="63" class="text-primary-l code-font" font-size="12" text-anchor="middle">Redis</text>
      <rect x="350" y="42" width="80" height="32" rx="16" class="pill-l"/><text x="390" y="63" class="text-primary-l code-font" font-size="12" text-anchor="middle">Tailwind</text>
    </g>

    <g transform="translate(510, 510)">
      <rect x="0" y="0" width="140" height="36" rx="8" fill="url(#accentGradL)"/>
      <text x="70" y="23" fill="#FFFFFF" font-size="13" font-weight="bold" text-anchor="middle">🚀 View Portfolio</text>
    </g>
  </g>

  <rect x="1" y="1" width="1178" height="608" rx="20" fill="none" stroke="url(#accentGradL)" stroke-width="1.5" opacity="0.3"/>
</svg>
